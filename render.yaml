services:
  - type: web
    name: shl-recommender-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GOOGLE_API_KEY
        sync: false # You will set this in the Render UI
      - key: CATALOG_PATH
        value: shl_catalog.json
      - key: PYTHON_VERSION
        value: 3.11.10
